<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Слайдер · Включи музику</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0806;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ══════════════════════════════════════════
       LOADING SCREEN
    ══════════════════════════════════════════ */
    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 40%, #1a0d1a 0%, #0a0608 60%, #000 100%);
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #loadingScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Велике серце що б'ється */
    .ls-heart {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 32px;
      filter: drop-shadow(0 0 30px rgba(255, 60, 100, 0.8));
      animation: lsHeartbeat 1.1s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes lsHeartbeat {
      0%   { transform: scale(1);    filter: drop-shadow(0 0 20px rgba(255,60,100,0.6)); }
      14%  { transform: scale(1.18); filter: drop-shadow(0 0 40px rgba(255,60,100,1)); }
      28%  { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255,60,100,0.7)); }
      42%  { transform: scale(1.16); filter: drop-shadow(0 0 38px rgba(255,100,140,0.9)); }
      70%  { transform: scale(1);    filter: drop-shadow(0 0 18px rgba(255,60,100,0.5)); }
      100% { transform: scale(1);    filter: drop-shadow(0 0 18px rgba(255,60,100,0.5)); }
    }

    .ls-title {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 6px;
      color: rgba(255, 230, 220, 0.85);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .ls-subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(255, 200, 190, 0.35);
      margin-bottom: 40px;
    }

    /* Прогрес-бар */
    .ls-progress-wrap {
      width: 220px;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }
    .ls-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4060, #ff80a0, #ffd0e0);
      border-radius: 10px;
      transition: width 0.4s ease;
      box-shadow: 0 0 12px rgba(255,80,120,0.6);
    }
    .ls-progress-text {
      font-size: 0.72rem;
      letter-spacing: 3px;
      color: rgba(255, 190, 180, 0.4);
    }

    /* Точки-підказка */
    .ls-dots {
      display: flex;
      gap: 7px;
      margin-top: 36px;
    }
    .ls-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,80,120,0.3);
      animation: lsDotPulse 1.4s ease-in-out infinite;
    }
    .ls-dot:nth-child(2) { animation-delay: 0.2s; }
    .ls-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes lsDotPulse {
      0%, 100% { background: rgba(255,80,120,0.2); transform: scale(1); }
      50%       { background: rgba(255,80,120,0.9); transform: scale(1.5); }
    }

    /* ══════════════════════════════════════════
       SLIDER
    ══════════════════════════════════════════ */
    .fullscreen-slider {
      position: relative;
      width: 100vw;
      height: 100vh; height: 100dvh;
      overflow: hidden;
      background: #0a0806;
    }

    /* ── Розмитий фон (iOS-дзеркало) ── */
    .bg-track {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .bg-slide.active { opacity: 1; }
    .bg-slide img {
      position: absolute;
      inset: -10%;
      width: 120%; height: 120%;
      object-fit: cover;
      filter: blur(32px) saturate(1.5) brightness(0.48);
      animation: bgFloat 10s ease-in-out infinite alternate;
    }
    @keyframes bgFloat {
      0%   { transform: scale(1.06) translate(0,0); }
      33%  { transform: scale(1.11) translate(-1.2%,0.6%); }
      66%  { transform: scale(1.08) translate(0.5%,-0.8%); }
      100% { transform: scale(1.13) translate(-0.6%,1%); }
    }
    .bg-slide::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 50%, transparent 25%, rgba(0,0,0,0.5) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.22) 0%, rgba(0,0,0,0.05) 45%, rgba(0,0,0,0.28) 100%);
      z-index: 1;
    }

    /* ── Заблюрені фото, що плавають на фоні ── */
    .floating-photos {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    .floating-photos.active { opacity: 1; }

    .floating-photo-slot {
      position: absolute;
      transform: translate(-50%, -50%);
    }
    .floating-photo {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 46px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
      filter: blur(5px) saturate(1.25) brightness(0.7);
      animation: photoDrift ease-in-out infinite;
      will-change: transform;
    }
    .floating-photo img {
      display: block;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity 1.1s ease;
    }
    @keyframes photoDrift {
      0%, 100% { transform: translate(0,0)                       rotate(var(--r0, -4deg)); }
      50%      { transform: translate(var(--dx, 3vw), var(--dy, -3vh)) rotate(var(--r1, 4deg)); }
    }
    @media (max-width: 560px) {
      .floating-photo { filter: blur(4px) saturate(1.2) brightness(0.7); }
    }

    /* ── Слайди ── */
    /* Контейнер відносний, overflow hidden, щоб анімації не виповзали */
    .slides-container {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      will-change: transform, opacity, filter;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }
    .slide.leaving {
      visibility: visible;
    }

    .slide img {
      display: block;
      max-width: 90%;
      max-height: 90%;
      width: auto; height: auto;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      border-radius: 6px;
      box-shadow:
        0 12px 60px rgba(0,0,0,0.65),
        0 3px 14px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.05);
      will-change: transform, filter, opacity;
    }

    .slide video {
      display: block;
      max-width: 90%;
      max-height: 90%;
      width: auto; height: auto;
      object-fit: contain;
      border-radius: 6px;
      box-shadow:
        0 12px 60px rgba(0,0,0,0.65),
        0 3px 14px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.05);
      will-change: transform, filter, opacity;
      background: #000;
    }

    /* Ken Burns тільки для фото, не для відео */
    .slide.active img {
      animation: kenBurns 5s ease-in-out forwards;
    }
    .slide.active video {
      animation: none;
    }

    /* ══════════════════════════════════════════
       АНІМАЦІЇ ПЕРЕХОДІВ (12 унікальних)
    ══════════════════════════════════════════ */

    /* 1. MORPH FADE — теплий спалах з кольором */
    @keyframes morphFadeIn {
      0%   { opacity:0; transform:scale(1.07); filter:brightness(2) saturate(0.3) blur(6px); }
      45%  { filter:brightness(1.15) saturate(1.2) blur(0px); }
      100% { opacity:1; transform:scale(1); filter:brightness(1) saturate(1); }
    }
    @keyframes morphFadeOut {
      0%   { opacity:1; transform:scale(1); filter:brightness(1); }
      100% { opacity:0; transform:scale(0.93); filter:brightness(0.4) saturate(0.2); }
    }

    /* 2. SHATTER ZOOM — вибуховий зум з пружиною */
    @keyframes shatterIn {
      0%   { opacity:0; transform:scale(0.5) rotate(-4deg); filter:brightness(2.5) blur(8px); }
      38%  { opacity:1; transform:scale(1.09) rotate(1.5deg); filter:brightness(1.1) blur(0); }
      58%  { transform:scale(0.96) rotate(-0.5deg); }
      78%  { transform:scale(1.03); }
      100% { opacity:1; transform:scale(1) rotate(0deg); filter:brightness(1); }
    }
    @keyframes shatterOut {
      0%   { opacity:1; transform:scale(1) rotate(0deg); filter:blur(0); }
      35%  { transform:scale(1.14) rotate(3deg); filter:blur(1px) brightness(1.4); }
      100% { opacity:0; transform:scale(1.4) rotate(6deg); filter:blur(10px) brightness(0.3); }
    }

    /* 3. CINEMATIC SLIDE — кінематографічне ковзання зі skew */
    @keyframes cinSlideIn {
      0%   { opacity:0; transform:translateX(-100%) skewX(6deg) scale(0.9); }
      55%  { opacity:1; transform:translateX(3%) skewX(-2deg) scale(1.01); }
      75%  { transform:translateX(-1%) skewX(1deg); }
      100% { opacity:1; transform:translateX(0) skewX(0deg) scale(1); }
    }
    @keyframes cinSlideOut {
      0%   { opacity:1; transform:translateX(0) skewX(0deg); }
      100% { opacity:0; transform:translateX(60%) skewX(-5deg) scale(0.88); filter:blur(3px); }
    }

    /* 4. CURTAIN — фіранка зверху з відскоком */
    @keyframes curtainIn {
      0%   { opacity:0; transform:translateY(-100%) scaleY(0.6); }
      52%  { opacity:1; transform:translateY(5%) scaleY(1.04); }
      70%  { transform:translateY(-2%) scaleY(0.99); }
      84%  { transform:translateY(1.5%); }
      100% { opacity:1; transform:translateY(0) scaleY(1); }
    }
    @keyframes curtainOut {
      0%   { opacity:1; transform:translateY(0) scaleY(1); }
      18%  { transform:translateY(-5%) scaleY(1.03); }
      100% { opacity:0; transform:translateY(105%) scaleY(0.7); }
    }

    /* 5. CARD FLIP 3D — картка перевертається по X */
    @keyframes cardFlipIn {
      0%   { opacity:0; transform:perspective(1000px) rotateX(90deg) translateY(-40px); filter:brightness(0.3); }
      45%  { filter:brightness(1.4); }
      72%  { transform:perspective(1000px) rotateX(-10deg) translateY(4px); }
      88%  { transform:perspective(1000px) rotateX(4deg); }
      100% { opacity:1; transform:perspective(1000px) rotateX(0deg) translateY(0); filter:brightness(1); }
    }
    @keyframes cardFlipOut {
      0%   { opacity:1; transform:perspective(1000px) rotateX(0deg); }
      40%  { opacity:0.5; transform:perspective(1000px) rotateX(-55deg) translateY(25px); filter:brightness(0.5); }
      100% { opacity:0; transform:perspective(1000px) rotateX(-95deg) translateY(50px); filter:brightness(0.1); }
    }

    /* 6. GLITCH — цифровий збій (плавний) */
    @keyframes glitchIn {
      0%   { opacity:0; transform:translateX(0) scaleX(1); filter:hue-rotate(0deg) brightness(1); }
      12%  { opacity:0.8; transform:translateX(-8px) scaleX(1.03); filter:hue-rotate(80deg) brightness(1.6); }
      24%  { transform:translateX(6px) scaleX(0.98); filter:hue-rotate(-50deg) brightness(0.8); }
      36%  { opacity:1; transform:translateX(-3px); filter:hue-rotate(30deg) brightness(1.3); }
      55%  { transform:translateX(2px); filter:hue-rotate(0deg) brightness(1.1); }
      75%  { transform:translateX(0); filter:brightness(1); }
      100% { opacity:1; transform:translateX(0) scaleX(1); filter:none; }
    }
    @keyframes glitchOut {
      0%   { opacity:1; filter:none; transform:translateX(0); }
      20%  { transform:translateX(10px) scaleX(1.04); filter:hue-rotate(140deg) brightness(1.6); }
      40%  { transform:translateX(-7px); filter:hue-rotate(-70deg) brightness(0.7); }
      65%  { opacity:0.5; transform:scaleX(0.96) translateX(4px); }
      100% { opacity:0; transform:scaleX(1.1) translateX(0); filter:brightness(0); }
    }

    /* 7. SPIRAL — закручується наче водоворот */
    @keyframes spiralIn {
      0%   { opacity:0; transform:rotate(-200deg) scale(0.15); filter:blur(16px) brightness(0.3); }
      40%  { opacity:0.85; filter:blur(4px) brightness(1.3); }
      68%  { transform:rotate(10deg) scale(1.05); filter:blur(0) brightness(1.1); }
      82%  { transform:rotate(-4deg) scale(0.98); }
      100% { opacity:1; transform:rotate(0deg) scale(1); filter:blur(0) brightness(1); }
    }
    @keyframes spiralOut {
      0%   { opacity:1; transform:rotate(0deg) scale(1); filter:blur(0); }
      28%  { transform:rotate(-12deg) scale(1.09); filter:brightness(1.3); }
      100% { opacity:0; transform:rotate(180deg) scale(0.1); filter:blur(14px) brightness(0.2); }
    }

    /* 8. DREAM FLOAT — пливе з розмиття наче спогад */
    @keyframes dreamIn {
      0%   { opacity:0; transform:translateY(70px) scale(0.85); filter:blur(22px) brightness(1.7) saturate(0.4); }
      32%  { filter:blur(8px) brightness(1.25) saturate(0.8); }
      60%  { transform:translateY(-10px) scale(1.03); filter:blur(0) saturate(1.1); }
      78%  { transform:translateY(4px) scale(1); }
      100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0) brightness(1) saturate(1); }
    }
    @keyframes dreamOut {
      0%   { opacity:1; transform:translateY(0) scale(1); filter:blur(0) saturate(1); }
      35%  { filter:blur(5px) saturate(0.6); }
      100% { opacity:0; transform:translateY(-55px) scale(1.08); filter:blur(20px) saturate(0.1) brightness(2); }
    }

    /* 9. SHUTTER — фотозатвор горизонтальна щілина */
    @keyframes shutterIn {
      0%   { opacity:1; clip-path:inset(50% 0 50% 0 round 4px); transform:scale(1.05); }
      45%  { clip-path:inset(3% 0 3% 0 round 2px); transform:scale(1.01); }
      100% { opacity:1; clip-path:inset(0% 0 0% 0); transform:scale(1); }
    }
    @keyframes shutterOut {
      0%   { opacity:1; clip-path:inset(0% 0 0% 0); transform:scale(1); }
      55%  { clip-path:inset(10% 0 10% 0 round 3px); opacity:1; transform:scale(0.98); }
      100% { opacity:0; clip-path:inset(50% 0 50% 0 round 6px); transform:scale(0.95); }
    }

    /* 10. PENDULUM — гойдається як маятник */
    @keyframes pendulumIn {
      0%   { opacity:0; transform:perspective(900px) rotateY(-80deg) translateX(-50px); filter:brightness(0.3); }
      48%  { opacity:1; transform:perspective(900px) rotateY(14deg) translateX(10px); filter:brightness(1.25); }
      65%  { transform:perspective(900px) rotateY(-6deg); }
      80%  { transform:perspective(900px) rotateY(3deg); }
      100% { opacity:1; transform:perspective(900px) rotateY(0deg) translateX(0); filter:brightness(1); }
    }
    @keyframes pendulumOut {
      0%   { opacity:1; transform:perspective(900px) rotateY(0deg); }
      38%  { transform:perspective(900px) rotateY(-18deg) translateX(-8px); }
      100% { opacity:0; transform:perspective(900px) rotateY(80deg) translateX(50px); filter:brightness(0.2); }
    }

    /* 11. PAPER FOLD — складається як аркуш паперу */
    @keyframes paperIn {
      0%   { opacity:0; transform:perspective(1200px) rotateX(-80deg) translateY(-60px) scale(0.75); filter:brightness(0.4); }
      42%  { opacity:1; filter:brightness(1.3); transform:perspective(1200px) rotateX(10deg) translateY(5px) scale(1.03); }
      65%  { transform:perspective(1200px) rotateX(-5deg) scale(0.99); }
      82%  { transform:perspective(1200px) rotateX(2deg); }
      100% { opacity:1; transform:perspective(1200px) rotateX(0deg) translateY(0) scale(1); filter:brightness(1); }
    }
    @keyframes paperOut {
      0%   { opacity:1; transform:perspective(1200px) rotateX(0deg) scale(1); }
      28%  { transform:perspective(1200px) rotateX(12deg) scale(1.04); filter:brightness(1.2); }
      100% { opacity:0; transform:perspective(1200px) rotateX(85deg) translateY(60px) scale(0.7); filter:brightness(0.2); }
    }

    /* 12. HEARTBEAT PULSE — б'ється як серце ❤ */
    @keyframes heartbeatIn {
      0%   { opacity:0; transform:scale(0.05); filter:brightness(4) blur(24px); }
      22%  { opacity:1; transform:scale(1.18); filter:brightness(1.6) blur(3px); }
      40%  { transform:scale(0.92); filter:blur(0) brightness(1.05); }
      58%  { transform:scale(1.08); }
      72%  { transform:scale(0.97); }
      84%  { transform:scale(1.03); }
      100% { opacity:1; transform:scale(1); filter:blur(0) brightness(1); }
    }
    @keyframes heartbeatOut {
      0%   { opacity:1; transform:scale(1); filter:brightness(1); }
      18%  { transform:scale(1.1); filter:brightness(1.4); }
      42%  { transform:scale(0.75); filter:brightness(2) blur(3px); }
      100% { opacity:0; transform:scale(0.04); filter:brightness(5) blur(20px); }
    }

    /* ── CSS класи ── */
    .slide.anim-in-morphFade   { animation: morphFadeIn   1.1s cubic-bezier(0.4,0,0.2,1) both; }
    .slide.anim-out-morphFade  { animation: morphFadeOut  0.68s cubic-bezier(0.4,0,1,1) both; }

    .slide.anim-in-shatter     { animation: shatterIn     0.88s cubic-bezier(0.22,1,0.36,1) both; }
    .slide.anim-out-shatter    { animation: shatterOut    0.62s ease-in both; }

    .slide.anim-in-cinSlide    { animation: cinSlideIn    0.92s cubic-bezier(0.16,1,0.3,1) both; }
    .slide.anim-out-cinSlide   { animation: cinSlideOut   0.62s cubic-bezier(0.7,0,1,1) both; }

    .slide.anim-in-curtain     { animation: curtainIn     1.0s cubic-bezier(0.34,1.3,0.64,1) both; }
    .slide.anim-out-curtain    { animation: curtainOut    0.72s cubic-bezier(0.4,0,0.9,1) both; }

    .slide.anim-in-cardFlip    { animation: cardFlipIn    0.92s cubic-bezier(0.22,1,0.36,1) both; }
    .slide.anim-out-cardFlip   { animation: cardFlipOut   0.7s ease-in both; }

    .slide.anim-in-glitch      { animation: glitchIn      0.95s cubic-bezier(0.4,0,0.2,1) both; }
    .slide.anim-out-glitch     { animation: glitchOut     0.72s cubic-bezier(0.4,0,0.8,1) both; }

    .slide.anim-in-spiral      { animation: spiralIn      1.1s cubic-bezier(0.34,1.1,0.64,1) both; }
    .slide.anim-out-spiral     { animation: spiralOut     0.78s cubic-bezier(0.4,0,1,1) both; }

    .slide.anim-in-dream       { animation: dreamIn       1.2s cubic-bezier(0.4,0,0.2,1) both; }
    .slide.anim-out-dream      { animation: dreamOut      0.82s cubic-bezier(0.4,0,0.8,1) both; }

    .slide.anim-in-shutter     { animation: shutterIn     0.72s cubic-bezier(0.22,1,0.36,1) both; }
    .slide.anim-out-shutter    { animation: shutterOut    0.62s cubic-bezier(0.4,0,1,1) both; }

    .slide.anim-in-pendulum    { animation: pendulumIn    1.05s cubic-bezier(0.34,1.2,0.64,1) both; }
    .slide.anim-out-pendulum   { animation: pendulumOut   0.7s ease-in both; }

    .slide.anim-in-paper       { animation: paperIn       1.0s cubic-bezier(0.34,1.3,0.64,1) both; }
    .slide.anim-out-paper      { animation: paperOut      0.7s ease-in both; }

    .slide.anim-in-heartbeat   { animation: heartbeatIn   0.95s cubic-bezier(0.34,1.4,0.64,1) both; }
    .slide.anim-out-heartbeat  { animation: heartbeatOut  0.62s ease-in both; }

    /* ══════════════════════════════════════════
       СЕРЦЯ
    ══════════════════════════════════════════ */
    .hearts-container {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      top: -60px;
      opacity: 0;
      user-select: none;
      will-change: transform, opacity;
      animation: heartFall ease-in-out forwards;
    }
    @keyframes heartFall {
      0%   { opacity:0;    transform:translateY(0)      rotate(0deg)   scale(0.2); }
      8%   { opacity:0;    transform:translateY(3vh)    rotate(4deg)   scale(0.7); }
      18%  { opacity:0.9;  transform:translateY(12vh)   rotate(8deg)   scale(1.1); }
      35%  { opacity:0.8;  transform:translateY(30vh)   rotate(-5deg)  scale(1.0); }
      55%  { opacity:0.7;  transform:translateY(52vh)   rotate(8deg)   scale(0.95); }
      75%  { opacity:0.45; transform:translateY(75vh)   rotate(-4deg)  scale(0.88); }
      88%  { opacity:0.15; transform:translateY(96vh)   rotate(10deg)  scale(0.65); }
      100% { opacity:0;    transform:translateY(115vh)  rotate(14deg)  scale(0.3); }
    }
    .heart.small  { font-size:14px; animation-duration:8s; }
    .heart.medium { font-size:24px; animation-duration:10s; }
    .heart.large  { font-size:34px; animation-duration:12s; }
    .heart.red    { color:#ff4757; text-shadow:0 0 18px rgba(255,71,87,.6); }
    .heart.pink   { color:#ff6b81; text-shadow:0 0 18px rgba(255,107,129,.6); }
    .heart.gold   { color:#ffd700; text-shadow:0 0 18px rgba(255,215,0,.5); }
    .heart.purple { color:#c084fc; text-shadow:0 0 18px rgba(192,132,252,.5); }
    .heart.white  { color:#ffe4e1; text-shadow:0 0 18px rgba(255,228,225,.4); }

    /* ══════════════════════════════════════════
       СТІКЕРИ (stitch1/)
    ══════════════════════════════════════════ */
    .stickers-container {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 21;
      overflow: hidden;
    }
    .sticker {
      position: absolute;
      top: -120px;
      opacity: 0;
      user-select: none;
      will-change: transform, opacity;
      animation: stickerFall ease-in-out forwards;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35));
    }
    .sticker img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
    }
    .sticker.sz-s  { width: 48px;  height: 48px;  animation-duration: 9s; }
    .sticker.sz-m  { width: 72px;  height: 72px;  animation-duration: 11s; }
    .sticker.sz-l  { width: 96px;  height: 96px;  animation-duration: 13s; }
    @keyframes stickerFall {
      0%   { opacity:0;    transform:translateY(0)      rotate(0deg)    scale(0.15); }
      7%   { opacity:0;    transform:translateY(2vh)    rotate(-6deg)   scale(0.6); }
      16%  { opacity:0.92; transform:translateY(10vh)   rotate(10deg)   scale(1.08); }
      32%  { opacity:0.85; transform:translateY(28vh)   rotate(-7deg)   scale(1.0); }
      50%  { opacity:0.78; transform:translateY(50vh)   rotate(9deg)    scale(0.97); }
      68%  { opacity:0.55; transform:translateY(72vh)   rotate(-5deg)   scale(0.9); }
      84%  { opacity:0.2;  transform:translateY(94vh)   rotate(11deg)   scale(0.68); }
      100% { opacity:0;    transform:translateY(114vh)  rotate(15deg)   scale(0.28); }
    }

    /* ══════════════════════════════════════════
       КРАПКИ
    ══════════════════════════════════════════ */
    .dots-overlay {
      position: absolute;
      bottom: 32px; left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 20px;
      pointer-events: none;
      z-index: 30;
    }
    .dots-overlay .dot {
      width: 10px; height: 10px;
      border-radius: 40px;
      background: rgba(255,240,225,0.28);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,235,220,0.14);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
      transform: scale(0.88);
    }
    .dots-overlay .dot.active {
      background: #f5e3d3;
      width: 32px;
      border-color: rgba(255,245,235,0.6);
      box-shadow: 0 0 18px rgba(230,190,160,0.25);
      transform: scale(1);
    }

    /* ══════════════════════════════════════════
       MUSIC OVERLAY
    ══════════════════════════════════════════ */
    .music-overlay {
      position: fixed; inset: 0;
      z-index: 1000;
      background: rgba(8,5,4,0.88);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .music-overlay.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }
    .music-overlay .icon {
      font-size: 4rem;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform:scale(1);    opacity:.7; }
      50%      { transform:scale(1.15); opacity:1; }
    }
    .music-overlay h2 {
      color: #f5e3d3;
      font-weight: 300;
      font-size: 1.6rem;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .music-overlay p {
      color: rgba(255,235,220,0.45);
      font-weight: 300;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }
    .music-overlay .btn-play {
      background: linear-gradient(135deg, #ff6b81, #ff4757);
      border: none;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 600;
      padding: 17px 50px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 2px;
      box-shadow: 0 8px 30px rgba(255,71,87,0.4);
      text-transform: uppercase;
      font-family: inherit;
    }
    .music-overlay .btn-play:hover {
      transform: scale(1.06);
      box-shadow: 0 12px 46px rgba(255,71,87,0.62);
    }
    .music-overlay .btn-play:active { transform: scale(0.95); }

    /* ══════════════════════════════════════════
       SOUND TOGGLE
    ══════════════════════════════════════════ */
    .sound-toggle {
      position: absolute;
      top: 26px; right: 26px;
      z-index: 40;
      background: rgba(18,12,10,0.42);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,235,220,0.12);
      color: #f0e2d6;
      width: 46px; height: 46px;
      border-radius: 60px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 1.3rem;
      box-shadow: 0 4px 14px rgba(0,0,0,0.22);
      user-select: none;
    }
    .sound-toggle.visible { display: flex; }
    .sound-toggle:hover {
      background: rgba(45,30,22,0.62);
      border-color: rgba(255,215,185,0.3);
      transform: scale(1.07);
    }
    .sound-toggle:active { transform: scale(0.93); }

    /* ══════════════════════════════════════════
       ЗАТЕМНЕННЯ МІЖ СЛАЙДАМИ
    ══════════════════════════════════════════ */
    #dimOverlay {
      position: absolute;
      inset: 0;
      z-index: 15;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0s;
    }

    /* ══════════════════════════════════════════
       КЕН БЕРНС — повільне відалення фото
    ══════════════════════════════════════════ */
    @keyframes kenBurns {
      0%   { transform: scale(1)    translate(0, 0); }
      100% { transform: scale(1.08) translate(-0.8%, 0.5%); }
    }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 560px) {
      .dots-overlay { bottom: 22px; gap: 9px; }
      .dots-overlay .dot { width: 9px; height: 9px; }
      .dots-overlay .dot.active { width: 26px; }
      .sound-toggle { top: 14px; right: 14px; width: 40px; height: 40px; font-size: 1.1rem; }
      .music-overlay h2 { font-size: 1.2rem; }
      .music-overlay .btn-play { padding: 14px 32px; font-size: 1rem; }
      .music-overlay .icon { font-size: 3rem; }
      .slide img { max-width: 96%; max-height: 86%; }
      .ls-heart { font-size: 56px; }
      .ls-title { font-size: 0.9rem; }
    }
    /* ══════════════════════════════════════════
       OUTRO SLIDE
    ══════════════════════════════════════════ */
    .outro-slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      z-index: 16;
      background: radial-gradient(ellipse at 50% 60%, rgba(80,10,30,0.55) 0%, transparent 70%);
    }
    .outro-slide.active {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .outro-hearts-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .outro-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .outro-slide.active .outro-content {
      animation: outroContentIn 1.4s cubic-bezier(0.34,1.2,0.64,1) both;
    }
    @keyframes outroContentIn {
      from { opacity:0; transform:translateY(30px) scale(0.88); filter:blur(10px); }
      60%  { filter:blur(0); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .outro-big-heart {
      font-size: 88px;
      line-height: 1;
      filter: drop-shadow(0 0 40px rgba(255,60,100,0.9));
      margin-bottom: 28px;
    }
    .outro-slide.active .outro-big-heart {
      animation: outroBeat 1.2s ease-in-out infinite;
    }
    @keyframes outroBeat {
      0%,100% { transform:scale(1);    filter:drop-shadow(0 0 30px rgba(255,60,100,0.7)); }
      14%     { transform:scale(1.22); filter:drop-shadow(0 0 55px rgba(255,60,100,1)); }
      28%     { transform:scale(1.07); filter:drop-shadow(0 0 35px rgba(255,80,120,0.8)); }
      42%     { transform:scale(1.18); filter:drop-shadow(0 0 50px rgba(255,100,140,0.9)); }
      70%     { transform:scale(1);    filter:drop-shadow(0 0 25px rgba(255,60,100,0.6)); }
    }

    .outro-title {
      font-size: clamp(1.3rem, 5vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 6px;
      color: #f5e3d3;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 14px;
      text-shadow: 0 2px 20px rgba(255,100,120,0.4);
    }

    .outro-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,180,160,0.6), transparent);
      margin-bottom: 18px;
    }

    .outro-author {
      font-size: clamp(0.95rem, 3.5vw, 1.35rem);
      font-weight: 400;
      letter-spacing: 3px;
      color: rgba(255, 200, 185, 0.75);
      text-align: center;
    }
    .outro-slide.active .outro-author {
      animation: outroAuthorIn 2s 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes outroAuthorIn {
      from { opacity:0; transform:translateY(12px); letter-spacing:8px; }
      to   { opacity:1; transform:translateY(0);    letter-spacing:3px; }
    }

    .outro-author span {
      color: #ff8fa3;
      font-weight: 600;
      text-shadow: 0 0 20px rgba(255,100,130,0.5);
    }

    .outro-replay {
      margin-top: 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,200,180,0.22);
      color: rgba(255,230,220,0.8);
      font-size: 0.82rem;
      font-family: inherit;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 12px 32px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.35s ease;
      backdrop-filter: blur(6px);
    }
    .outro-slide.active .outro-replay {
      animation: outroAuthorIn 2s 1s cubic-bezier(0.4,0,0.2,1) both;
    }
    .outro-replay:hover {
      background: rgba(255,100,120,0.2);
      border-color: rgba(255,150,160,0.5);
      color: #fff;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,80,120,0.25);
    }
    .outro-replay:active { transform: scale(0.97); }
  </style>
</head>
<body>

<!-- ══════ LOADING SCREEN ══════ -->
<div id="loadingScreen">
  <div class="ls-heart">❤️</div>
  <div class="ls-title">Завантаження</div>
  <div class="ls-subtitle">зачекай хвилинку</div>
  <div class="ls-progress-wrap">
    <div class="ls-progress-bar" id="progressBar"></div>
  </div>
  <div class="ls-progress-text" id="progressText">0%</div>
  <div class="ls-dots">
    <div class="ls-dot"></div>
    <div class="ls-dot"></div>
    <div class="ls-dot"></div>
  </div>
</div>

<!-- ══════ SLIDER ══════ -->
<div class="fullscreen-slider" id="slider">
  <div class="bg-track"       id="bgTrack"></div>
  <div class="floating-photos" id="floatingPhotos"></div>
  <div class="slides-container" id="slidesContainer"></div>
  <div id="dimOverlay"></div>
  <div class="hearts-container"   id="heartsContainer"></div>
  <div class="stickers-container" id="stickersContainer"></div>
  <div class="dots-overlay"       id="dotsContainer"></div>

  <!-- OUTRO SLIDE -->
  <div class="outro-slide" id="outroSlide">
    <div class="outro-hearts-burst" id="outroBurst"></div>
    <div class="outro-content">
      <div class="outro-big-heart">❤️</div>
      <div class="outro-title">Дякую за перегляд</div>
      <div class="outro-divider"></div>
      <div class="outro-author">автор <span>@flytag</span></div>
      <button class="outro-replay" id="outroReplay">↺ &nbsp; Переглянути знову</button>
    </div>
  </div>

  <button class="sound-toggle" id="soundToggle" aria-label="Вимкнути звук">🔊</button>
</div>

<!-- ══════ MUSIC OVERLAY ══════ -->
<div class="music-overlay" id="musicOverlay">
  <div class="icon">🎵</div>
  <h2>Натисни, щоб почати</h2>
  <p>ввімкни музику для повного занурення</p>
  <button class="btn-play" id="playBtn">▶  Включити музику</button>
</div>

<script>
(function () {
  'use strict';

  const bgTrack         = document.getElementById('bgTrack');
  const floatingPhotos  = document.getElementById('floatingPhotos');
  const slidesContainer = document.getElementById('slidesContainer');
  const dotsContainer   = document.getElementById('dotsContainer');
  const heartsContainer   = document.getElementById('heartsContainer');
  const stickersContainer = document.getElementById('stickersContainer');
  const soundToggle     = document.getElementById('soundToggle');
  const musicOverlay    = document.getElementById('musicOverlay');
  const playBtn         = document.getElementById('playBtn');
  const loadingScreen   = document.getElementById('loadingScreen');
  const progressBar     = document.getElementById('progressBar');
  const progressText    = document.getElementById('progressText');
  const dimOverlay      = document.getElementById('dimOverlay');

  let currentIndex    = 0;
  let timeoutId       = null;
  let isTransitioning = false;
  let heartInterval   = null;
  let isSoundOn       = true;
  let isMusicStarted  = false;
  let isRevealed      = false;
  let totalSlides     = 0;
  let lastAnim        = -1;

  // ══════════════════════════════════════════
  // АНІМАЦІЇ — пари (вхід, вихід)
  // ══════════════════════════════════════════
  const ANIMS = [
    { in: 'morphFade', out: 'morphFade' },
    { in: 'shatter',   out: 'shatter'   },
    { in: 'cinSlide',  out: 'cinSlide'  },
    { in: 'curtain',   out: 'curtain'   },
    { in: 'cardFlip',  out: 'cardFlip'  },
    { in: 'glitch',    out: 'glitch'    },
    { in: 'spiral',    out: 'spiral'    },
    { in: 'dream',     out: 'dream'     },
    { in: 'shutter',   out: 'shutter'   },
    { in: 'pendulum',  out: 'pendulum'  },
    { in: 'paper',     out: 'paper'     },
    { in: 'heartbeat', out: 'heartbeat' },
  ];

  function pickAnim() {
    let idx;
    do { idx = Math.floor(Math.random() * ANIMS.length); } while (idx === lastAnim);
    lastAnim = idx;
    return ANIMS[idx];
  }

  function clearAnimClasses(el) {
    const toRemove = [...el.classList].filter(c => c.startsWith('anim-'));
    toRemove.forEach(c => el.classList.remove(c));
  }


  // ══════════════════════════════════════════
  // ЗАВАНТАЖЕННЯ МЕДІА — фото + відео разом
  // Шукає photo/photo1.jpg, photo/video1.mp4 і т.д.
  // Нумерація спільна: photo1, photo2, video3...
  // Зупиняється коли цілий batch порожній.
  // ══════════════════════════════════════════
  function loadPhotos() {
    return new Promise((resolve) => {
      // mediaItems: [{index, url, type}]  type = 'photo' | 'video'
      const mediaItems = [];
      const BATCH = 6;
      const MAX   = 99;

      function setProgress(pct) {
        const p = Math.min(100, Math.round(pct));
        progressBar.style.width = p + "%";
        progressText.textContent = p + "%";
      }

      function finish() {
        setProgress(100);
        setTimeout(() => {
          loadingScreen.classList.add("hidden");
          if (mediaItems.length === 0) {
            // Fallback — демо фото якщо нічого немає
            resolve([
              { url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200&h=800&fit=crop&auto=format", type: 'photo' },
              { url: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200&h=800&fit=crop&auto=format", type: 'photo' },
              { url: "https://images.unsplash.com/photo-1470071459604-7b8ec44ffd34?w=1200&h=800&fit=crop&auto=format", type: 'photo' },
              { url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200&h=800&fit=crop&auto=format", type: 'photo' },
              { url: "https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=1200&h=800&fit=crop&auto=format", type: 'photo' }
            ]);
          } else {
            resolve(mediaItems);
          }
        }, 350);
      }

      // Перевіряємо один номер: спочатку фото, потім відео
      function checkOne(index) {
        return new Promise((res) => {
          // Спочатку пробуємо photo
          const photoUrl = "photo/photo" + index + ".jpg";
          const img = new Image();
          img.onload = () => res({ index, url: photoUrl, type: 'photo' });
          img.onerror = () => {
            // Якщо фото нема — пробуємо відео
            const videoUrl = "photo/video" + index + ".mp4";
            const vid = document.createElement('video');
            vid.preload = 'metadata';
            vid.onloadedmetadata = () => res({ index, url: videoUrl, type: 'video' });
            vid.onerror = () => res({ index, url: null, type: null });
            vid.src = videoUrl;
          };
          img.src = photoUrl;
        });
      }

      function checkBatch(start) {
        const promises = [];
        for (let i = start; i < start + BATCH && i <= MAX; i++) {
          promises.push(checkOne(i));
        }
        return Promise.all(promises);
      }

      async function scan() {
        let start = 1;
        while (start <= MAX) {
          const results = await checkBatch(start);
          let found = 0;
          results.sort((a, b) => a.index - b.index).forEach(r => {
            if (r.url) { mediaItems.push({ url: r.url, type: r.type }); found++; }
          });
          setProgress((start / MAX) * 95);
          if (found === 0) break;
          start += BATCH;
        }
        finish();
      }

      scan();
    });
  }

  // ══════════════════════════════════════════
  // ПЛАВАЮЧІ ЗАБЛЮРЕНІ ФОТО НА ФОНІ
  // ══════════════════════════════════════════
  let allPhotos = [];

  function createFloatingPhotos(mediaArr) {
    // Для фону використовуємо тільки фото (не відео)
    allPhotos = mediaArr.filter(m => m.type === 'photo').map(m => m.url);
    // Якщо зовсім немає фото — беремо всі медіа як url (fallback)
    if (allPhotos.length === 0) allPhotos = mediaArr.map(m => m.url);
    floatingPhotos.innerHTML = '';
    if (allPhotos.length === 0) return;

    const SPOTS = [
      { l: 10, t: 16 }, { l: 88, t: 13 }, { l: 5,  t: 60 },
      { l: 93, t: 64 }, { l: 20, t: 88 }, { l: 80, t: 90 },
      { l: 50, t: 8  }, { l: 50, t: 95 },
    ];
    const count = Math.min(SPOTS.length, Math.max(3, Math.ceil(allPhotos.length / 2)));

    for (let i = 0; i < count; i++) {
      const spot = SPOTS[i];
      const slot = document.createElement('div');
      slot.className = 'floating-photo-slot';
      slot.style.left = spot.l + '%';
      slot.style.top  = spot.t + '%';

      const photo = document.createElement('div');
      photo.className = 'floating-photo';
      const w = 95 + Math.random() * 75;
      photo.style.width  = w.toFixed(0) + 'px';
      photo.style.height = (w * (0.68 + Math.random() * 0.18)).toFixed(0) + 'px';
      photo.style.setProperty('--dx', (Math.random() * 7 - 3.5).toFixed(1) + 'vw');
      photo.style.setProperty('--dy', (Math.random() * 7 - 3.5).toFixed(1) + 'vh');
      photo.style.setProperty('--r0', (Math.random() * 10 - 5).toFixed(1) + 'deg');
      photo.style.setProperty('--r1', (Math.random() * 12 - 6).toFixed(1) + 'deg');
      photo.style.animationDuration = (17 + Math.random() * 11).toFixed(1) + 's';
      photo.style.animationDelay    = (-(Math.random() * 14)).toFixed(1) + 's';

      const img = document.createElement('img');
      img.src = allPhotos[Math.floor(Math.random() * allPhotos.length)];
      img.alt = ''; img.loading = 'lazy'; img.draggable = false;
      photo.appendChild(img);
      slot.appendChild(photo);
      floatingPhotos.appendChild(slot);

      cycleFloatingImage(img);
    }
  }

  function cycleFloatingImage(img) {
    const delay = 5500 + Math.random() * 6000;
    setTimeout(() => {
      if (!img.isConnected || allPhotos.length === 0) return;
      img.style.opacity = '0';
      setTimeout(() => {
        if (!img.isConnected) return;
        img.src = allPhotos[Math.floor(Math.random() * allPhotos.length)];
        img.style.opacity = '1';
        cycleFloatingImage(img);
      }, 1100);
    }, delay);
  }

  // ══════════════════════════════════════════
  // СТВОРЕННЯ СЛАЙДІВ (фото + відео)
  // ══════════════════════════════════════════
  // mediaArr: [{url, type}]  type = 'photo' | 'video'
  let mediaList = []; // зберігаємо для revealFirstSlide і goToSlide

  function createSlides(mediaArr) {
    mediaList = mediaArr;
    totalSlides = mediaArr.length;
    bgTrack.innerHTML = '';
    slidesContainer.innerHTML = '';
    dotsContainer.innerHTML = '';

    // Окремий масив тільки фото-urls для bg (відео на фон не ставимо)
    const photoBgUrls = mediaArr.map(m => m.type === 'photo' ? m.url : null);

    mediaArr.forEach((media, i) => {
      // ── Фон ──
      const bgSlide = document.createElement('div');
      bgSlide.className = 'bg-slide';
      // Для фону завжди img; якщо це відео — беремо найближче фото
      const bgSrc = media.type === 'photo'
        ? media.url
        : (photoBgUrls.find(u => u) || media.url);
      const bgImg = document.createElement('img');
      bgImg.src = bgSrc; bgImg.alt = ''; bgImg.loading = 'lazy'; bgImg.draggable = false;
      bgImg.style.animationDuration = ((6 + (i * 0.5) % 4)) + 's';
      bgImg.style.animationDelay    = -(i * 1.3) + 's';
      bgSlide.appendChild(bgImg);
      bgTrack.appendChild(bgSlide);

      // ── Слайд ──
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.index = i;
      slide.dataset.type  = media.type;

      if (media.type === 'video') {
        const vid = document.createElement('video');
        vid.src           = media.url;
        vid.muted         = true;   // без звуку
        vid.playsInline   = true;
        vid.preload       = 'metadata';
        vid.draggable     = false;
        // Після кінця відео — наступний слайд
        vid.addEventListener('ended', () => {
          if (slide.classList.contains('active') && !isTransitioning) {
            stopAutoplay();
            const next = currentIndex + 1;
            if (next >= totalSlides) showOutro();
            else goToSlide(next);
          }
        });
        slide.appendChild(vid);
      } else {
        const img = document.createElement('img');
        img.src = media.url;
        img.alt = `Фото ${i + 1}`;
        img.loading = 'lazy';
        img.draggable = false;
        slide.appendChild(img);
      }

      slidesContainer.appendChild(slide);

      // ── Крапка ──
      const dot = document.createElement('span');
      dot.className = 'dot';
      if (media.type === 'video') dot.style.borderRadius = '3px'; // квадратик для відео
      dotsContainer.appendChild(dot);
    });
  }

  // Показуємо перший слайд і запускаємо автоплей/серця.
  // Викликається через 5с після старту музики, а не одразу при завантаженні.
  function revealFirstSlide() {
    isRevealed = true;
    const firstSlide = slidesContainer.querySelector('.slide');
    if (firstSlide) {
      firstSlide.classList.add('active');
      const vid = firstSlide.querySelector('video');
      if (vid) {
        // Плавна поява + відразу запуск відео
        firstSlide.style.opacity = '0';
        firstSlide.style.transition = 'opacity 0.9s ease';
        vid.currentTime = 0;
        vid.play().catch(() => {});
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            firstSlide.style.opacity = '1';
            setTimeout(() => {
              firstSlide.style.transition = '';
              firstSlide.style.opacity = '';
            }, 950);
          });
        });
      } else {
        startAutoplay();
      }
    }
    updateDots(0);
    updateBg(0);
    floatingPhotos.classList.add('active');
    startHeartRain();
    startStickerRain();
  }

  function updateDots(idx) {
    dotsContainer.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === idx)
    );
  }
  function updateBg(idx) {
    bgTrack.querySelectorAll('.bg-slide').forEach((s, i) =>
      s.classList.toggle('active', i === idx)
    );
  }

  // ══════════════════════════════════════════
  // ЗАТЕМНЕННЯ
  // ══════════════════════════════════════════
  function dimAndSwitch(callback) {
    // Плавно затемнюємо
    dimOverlay.style.transition = 'opacity 0.45s ease';
    dimOverlay.style.opacity = '0.72';
    setTimeout(() => {
      callback();
      // Повертаємо прозорість
      setTimeout(() => {
        dimOverlay.style.transition = 'opacity 0.55s ease';
        dimOverlay.style.opacity = '0';
      }, 80);
    }, 450);
  }

  // ══════════════════════════════════════════
  // ПЕРЕХІД З АНІМАЦІЄЮ
  // ══════════════════════════════════════════
  function goToSlide(index) {
    if (isTransitioning) return;
    if (index < 0) index = totalSlides - 1;
    if (index >= totalSlides) index = 0;
    if (index === currentIndex) return;

    isTransitioning = true;
    const slides = slidesContainer.querySelectorAll('.slide');
    const prevSlide = slides[currentIndex];
    const nextSlide = slides[index];

    const nextIsVideo = nextSlide.dataset.type === 'video';
    const prevIsVideo = prevSlide.dataset.type === 'video';

    // Зупиняємо відео на попередньому слайді
    const prevVid = prevSlide.querySelector('video');
    if (prevVid) { prevVid.pause(); }

    // ── Якщо НАСТУПНИЙ слайд — відео: плавний crossfade без важких анімацій ──
    if (nextIsVideo || prevIsVideo) {
      const vid = nextSlide.querySelector('video');
      if (vid) {
        vid.currentTime = 0;
        vid.play().catch(() => {});
      }

      // Плавне затемнення поточного
      prevSlide.style.transition = 'opacity 0.7s ease';
      prevSlide.style.opacity    = '0';

      // Відео-слайд плавно з'являється
      nextSlide.style.transition = 'opacity 0.7s ease';
      nextSlide.style.opacity    = '0';
      nextSlide.classList.add('active');
      void nextSlide.offsetWidth;
      nextSlide.style.opacity = '1';

      // Оновлюємо фон і dots одразу
      currentIndex = index;
      updateDots(currentIndex);
      updateBg(currentIndex);

      setTimeout(() => {
        prevSlide.classList.remove('active', 'leaving');
        prevSlide.style.transition = '';
        prevSlide.style.opacity    = '';
        nextSlide.style.transition = '';
        nextSlide.style.opacity    = '';
        if (prevVid) { prevVid.currentTime = 0; }
        isTransitioning = false;
        // Для відео — scheduleNext викличеться через 'ended' event
        // Якщо попереднє було відео а наступне фото — запускаємо autoplay
        if (!nextIsVideo) scheduleNext();
      }, 750);

      return;
    }

    // ── Звичайний перехід для фото ──
    const anim = pickAnim();

    dimAndSwitch(() => {
      const prevImg = prevSlide.querySelector('img');
      if (prevImg) { prevImg.style.animation = 'none'; void prevImg.offsetWidth; }

      clearAnimClasses(prevSlide);
      prevSlide.classList.add('leaving', `anim-out-${anim.out}`);
      prevSlide.classList.remove('active');

      clearAnimClasses(nextSlide);
      nextSlide.classList.remove('leaving');
      void nextSlide.offsetWidth;
      nextSlide.classList.add(`anim-in-${anim.in}`, 'active');

      const nextImg = nextSlide.querySelector('img');
      if (nextImg) { nextImg.style.animation = 'none'; void nextImg.offsetWidth; nextImg.style.animation = ''; }

      currentIndex = index;
      updateDots(currentIndex);
      updateBg(currentIndex);
    });

    const DURATION = 1000;
    setTimeout(() => {
      clearAnimClasses(prevSlide);
      prevSlide.classList.remove('leaving');
      prevSlide.style.opacity = '';
      clearAnimClasses(nextSlide);
      isTransitioning = false;
      scheduleNext();
    }, DURATION + 500);
  }

  function getRandomDelay() { return 3200 + Math.floor(Math.random() * 2200); }
  function scheduleNext() {
    if (timeoutId) clearTimeout(timeoutId);
    timeoutId = setTimeout(() => {
      const next = currentIndex + 1;
      if (next >= totalSlides) {
        showOutro();
      } else {
        goToSlide(next);
      }
    }, getRandomDelay());
  }
  function startAutoplay() { if (timeoutId) clearTimeout(timeoutId); scheduleNext(); }
  function stopAutoplay()  { if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; } }

  // ══════════════════════════════════════════
  // СЕРЦЯ
  // ══════════════════════════════════════════
  const heartEmojis  = ['♥','❤','♥','❤','♥'];
  const heartColors  = ['red','pink','gold','purple','white'];
  const heartSizes   = ['small','medium','large'];

  function createHeart() {
    const h = document.createElement('div');
    h.className = `heart ${heartSizes[Math.floor(Math.random()*3)]} ${heartColors[Math.floor(Math.random()*5)]}`;
    h.textContent = heartEmojis[Math.floor(Math.random()*5)];
    h.style.left = (2 + Math.random() * 96) + '%';
    h.style.animationDelay    = (Math.random() * 2.5) + 's';
    h.style.animationDuration = (3.5 + Math.random() * 3) + 's';
    return h;
  }
  function spawnHearts(n = 3) {
    const count = n + (Math.random() > 0.5 ? 1 : 0) + (Math.random() > 0.75 ? 1 : 0);
    for (let i = 0; i < count; i++) {
      const h = createHeart();
      h.style.animationDelay = (i * 0.45 + Math.random() * 0.5) + 's';
      heartsContainer.appendChild(h);
      const dur = parseFloat(h.style.animationDuration) * 1000 +
                  parseFloat(h.style.animationDelay) * 1000 + 300;
      setTimeout(() => { if (h.parentNode) h.remove(); }, dur);
    }
    const all = heartsContainer.querySelectorAll('.heart');
    if (all.length > 30) Array.from(all).slice(0, all.length - 30).forEach(h => h.remove());
  }
  function startHeartRain() {
    if (heartInterval) clearInterval(heartInterval);
    spawnHearts(3);
    heartInterval = setInterval(() => spawnHearts(3), 2200 + Math.floor(Math.random() * 1500));
  }
  function stopHeartRain() {
    if (heartInterval) { clearInterval(heartInterval); heartInterval = null; }
  }

  // ══════════════════════════════════════════
  // СТІКЕРИ — завантаження + дощ
  // stitch1/st1.png, st2.png ... автодетект
  // ══════════════════════════════════════════
  let stickerUrls    = [];
  let stickerInterval = null;

  async function loadStickers() {
    const found = [];
    const MAX = 30;
    for (let i = 1; i <= MAX; i++) {
      const url = 'stitch1/st' + i + '.png';
      const ok = await new Promise(res => {
        const img = new Image();
        img.onload  = () => res(true);
        img.onerror = () => res(false);
        img.src = url;
      });
      if (!ok) break;
      found.push(url);
    }
    stickerUrls = found;
  }

  const STICKER_SIZES = ['sz-s', 'sz-m', 'sz-l'];

  function createSticker() {
    if (stickerUrls.length === 0) return null;
    const el = document.createElement('div');
    el.className = 'sticker ' + STICKER_SIZES[Math.floor(Math.random() * STICKER_SIZES.length)];
    el.style.left            = (2 + Math.random() * 96) + '%';
    el.style.animationDelay  = (Math.random() * 1.8) + 's';
    const dur = parseFloat(el.style.animationDuration || '11') ;
    el.style.animationDuration = (dur * (0.85 + Math.random() * 0.3)).toFixed(1) + 's';

    const img = document.createElement('img');
    img.src = stickerUrls[Math.floor(Math.random() * stickerUrls.length)];
    img.alt = '';
    img.draggable = false;
    el.appendChild(img);
    return el;
  }

  function spawnStickers(n = 1) {
    for (let i = 0; i < n; i++) {
      const s = createSticker();
      if (!s) return;
      s.style.animationDelay = (i * 0.6 + Math.random() * 0.6) + 's';
      stickersContainer.appendChild(s);
      const dur = parseFloat(s.style.animationDuration) * 1000
                + parseFloat(s.style.animationDelay)    * 1000 + 400;
      setTimeout(() => { if (s.parentNode) s.remove(); }, dur);
    }
    // Не більше 20 стікерів одночасно
    const all = stickersContainer.querySelectorAll('.sticker');
    if (all.length > 20) Array.from(all).slice(0, all.length - 20).forEach(s => s.remove());
  }

  function startStickerRain() {
    if (stickerUrls.length === 0) return;
    if (stickerInterval) clearInterval(stickerInterval);
    spawnStickers(1);
    stickerInterval = setInterval(() => spawnStickers(1), 3500 + Math.floor(Math.random() * 2500));
  }

  function stopStickerRain() {
    if (stickerInterval) { clearInterval(stickerInterval); stickerInterval = null; }
  }

  const outroSlide  = document.getElementById('outroSlide');
  const outroReplay = document.getElementById('outroReplay');
  const outroBurst  = document.getElementById('outroBurst');

  // ══════════════════════════════════════════
  // OUTRO
  // ══════════════════════════════════════════
  function showOutro() {
    stopAutoplay();
    // Захист: гарантуємо що затемнення прозоре
    dimOverlay.style.transition = 'none';
    dimOverlay.style.opacity = '0';
    // Оновлюємо фон на останній слайд
    updateBg(totalSlides - 1);

    // Ховаємо dots
    dotsContainer.style.opacity = '0';
    dotsContainer.style.transition = 'opacity 0.8s ease';

    // Показуємо outro
    outroSlide.classList.add('active');

    // Запускаємо зливу сердець на outro
    burstHearts();
  }

  function burstHearts() {
    // Перший залп — багато сердець одразу
    for (let i = 0; i < 18; i++) {
      setTimeout(() => spawnOutroHeart(), i * 120);
    }
    // Потім постійний дощ
    if (!heartInterval) {
      heartInterval = setInterval(() => {
        for (let i = 0; i < 3; i++) spawnOutroHeart();
      }, 800);
    }
  }

  function spawnOutroHeart() {
    const h = createHeart();
    h.style.animationDelay = (Math.random() * 0.4) + 's';
    heartsContainer.appendChild(h);
    const dur = parseFloat(h.style.animationDuration) * 1000 +
                parseFloat(h.style.animationDelay) * 1000 + 300;
    setTimeout(() => { if (h.parentNode) h.remove(); }, dur);
  }

  function hideOutro() {
    outroSlide.classList.remove('active');
    dotsContainer.style.opacity = '';
    dotsContainer.style.transition = '';
  }

  outroReplay.addEventListener('click', () => {
    hideOutro();
    currentIndex = 0;
    const slides = slidesContainer.querySelectorAll('.slide');
    slides.forEach(s => {
      s.classList.remove('active','leaving');
      clearAnimClasses(s);
      // Зупиняємо всі відео
      const vid = s.querySelector('video');
      if (vid) { vid.pause(); vid.currentTime = 0; }
    });
    slides[0].classList.add('active');
    updateDots(0);
    updateBg(0);
    // Перший слайд може бути відео
    const firstVid = slides[0].querySelector('video');
    if (firstVid) {
      firstVid.play().catch(() => {});
    } else {
      startAutoplay();
    }
  });


  const audio = new Audio('music/music.mp3');
  audio.loop   = true;   // Музика грає нескінченно
  audio.volume = 0.7;
  // Подвійний захист: якщо loop не спрацював — перезапускаємо вручну
  audio.addEventListener('ended', () => {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  });

  function startMusic() {
    if (isMusicStarted) return;
    isMusicStarted = true;
    audio.play().then(() => {
      musicOverlay.classList.add('hidden');
      soundToggle.classList.add('visible');
      soundToggle.textContent = '🔊';
      // Фото з'являється через 3.4с після старту музики
      setTimeout(revealFirstSlide, 3400);
    }).catch(() => {
      isMusicStarted = false;
      alert('❌ Файл music/music.mp3 не знайдено!\nПокладіть аудіо в папку music');
    });
  }
  function toggleSound() {
    if (!isMusicStarted) return;
    isSoundOn = !isSoundOn;
    if (isSoundOn) { audio.play().catch(() => {}); soundToggle.textContent = '🔊'; }
    else           { audio.pause(); soundToggle.textContent = '🔇'; }
  }

  // ══════════════════════════════════════════
  // ПОДІЇ
  // ══════════════════════════════════════════
  playBtn.addEventListener('click', e => { e.preventDefault(); startMusic(); });
  musicOverlay.addEventListener('click', e => { if (e.target === musicOverlay) startMusic(); });
  soundToggle.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); toggleSound(); });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      stopAutoplay(); stopHeartRain(); stopStickerRain();
      if (isSoundOn && isMusicStarted) audio.pause();
    } else {
      if (isRevealed) { startAutoplay(); startHeartRain(); startStickerRain(); }
      if (isSoundOn && isMusicStarted) audio.play().catch(() => {});
    }
  });

  document.addEventListener('contextmenu', e => e.preventDefault());

  // ══════════════════════════════════════════
  // ІНІЦІАЛІЗАЦІЯ
  // ══════════════════════════════════════════
  async function init() {
    const media = await loadPhotos(); // повертає [{url, type}]
    createSlides(media);
    createFloatingPhotos(media);
    await loadStickers(); // завантажуємо стікери паралельно
    // Слайди не показуємо тут — це станеться через 3.4с після старту музики (revealFirstSlide)
  }

  init();

})();
</script>
</body>
</html>
