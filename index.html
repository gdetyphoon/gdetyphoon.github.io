<!doctype html><html lang='uk'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Romantic</title><style>
body{margin:0;overflow:hidden;font-family:Georgia;background:linear-gradient(45deg,#ff9ecf,#c58cff,#87cefa);background-size:400% 400%;animation:bg 12s ease infinite;display:flex;justify-content:center;align-items:center;height:100vh}
@keyframes bg{50%{background-position:100% 50%}}
#c{text-align:center;color:#fff;text-shadow:0 0 10px #f0f}
button{padding:14px 30px;border:0;border-radius:30px;font-size:22px;margin:10px;cursor:pointer}#y{background:#ff4f8b;color:#fff}#n{position:absolute;background:#666;color:#fff}#msg{display:none;font-size:48px}.heart{position:absolute;color:#ff4f8b;animation:f 8s linear forwards}.spark{position:absolute;width:6px;height:6px;border-radius:50%;animation:e 1.5s forwards}@keyframes f{to{transform:translateY(110vh);opacity:0}}@keyframes e{to{transform:translate(var(--x),var(--y));opacity:0}}
</style></head><body><div id=c><h1>Аня, ти хочеш отримати подарок? 💖</h1><button id=y>Так</button><button id=n>Ні</button><div id=msg>💖 Держи! 🌹<br>Я бажаю тобі щастя, любові, посмішок і гарного настрою! ✨</div></div>
<audio id=audio loop><source src='https://actions.google.com/sounds/v1/ambiences/birds_in_forest.ogg'></audio>
<script>
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent=['💖','❤️','💕','🌸'][Math.floor(Math.random()*4)];h.style.left=Math.random()*innerWidth+'px';h.style.top='-20px';h.style.fontSize=(20+Math.random()*25)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),8000)},250);
n.onmouseover=n.onclick=()=>{n.style.left=Math.random()*(innerWidth-120)+'px';n.style.top=Math.random()*(innerHeight-60)+'px';n.style.transform='rotate('+Math.random()*360+'deg) scale('+(0.8+Math.random()*0.8)+')'};
y.onclick=()=>{c.querySelector('h1').style.display='none';y.style.display=n.style.display='none';msg.style.display='block';audio.play().catch(()=>{});setInterval(()=>{let x=Math.random()*innerWidth,y=Math.random()*innerHeight;for(let i=0;i<100;i++){let s=document.createElement('div');s.className='spark';s.style.left=x+'px';s.style.top=y+'px';s.style.background='hsl('+Math.random()*360+',100%,60%)';let a=Math.random()*6.28,d=50+Math.random()*180;s.style.setProperty('--x',Math.cos(a)*d+'px');s.style.setProperty('--y',Math.sin(a)*d+'px');document.body.appendChild(s);setTimeout(()=>s.remove(),1500)}},300)}
</script></body></html>
